  (Basierend auf {n_crossref} Konferenzbeiträgen von ASH/ASCO/EHA)

# Task instructions for MOLECULAR mode
task_instructions_molecular: |

  === IHRE AUFGABE ===

  Befolgen Sie folgende Anweisungen. Die Formulierung des KONFERENZBESCHLUSS hat höchste Priorität.

  1. Analysieren Sie die Variantenklassifikation nach Horak et al. 2022 und/oder die Zytogenetik (FISH-Befunde)
     - Horak et al. 2022:
         - Bewerten Sie die Punktevergabe für jede Variante
         - Identifizieren Sie die höchste Klassifikation (Oncogenic > Likely Oncogenic > VUS > Likely Benign > Benign)
     - FISH-Befunde:
         - Achten Sie auf therapierelevante Veränderungen

  2. Bewerten Sie die PubMed-Evidenz für zielgerichtete Therapien, wenn vorhanden
     - Extrahieren Sie konkrete Therapieoptionen aus den Artikeln
     - Beachten Sie Evidenzlevel und Studienphase

  3. Formulieren Sie einen KONFERENZBESCHLUSS basierend auf der Klassifikation:
     - Oncogenic/Likely Oncogenic: Konkrete Therapieempfehlung mit Substanz und Evidenz
     - VUS mit hoher Punktzahl (≥4): Studieneinschluss oder Re-Evaluation empfehlen
     - VUS ohne Evidenz: Watchful Waiting, erneute Testung bei Progress
     - Benign/Likely Benign: "Keine therapierelevanten Varianten identifiziert"

  4. Begründen Sie Ihre Entscheidung mit Bezug auf Klassifikation und Literatur

  Begrenzen Sie Ihre Teilantworten auf 400 Zeichen oder weniger.

# JSON Schema for OpenAI structured outputs
# This ensures the LLM always returns properly formatted decisions
json_schema:
  name: tumor_board_decision
  strict: true
  schema:
    type: object
    properties:
      konferenzbeschluss:
        type: string
        description: Der eindeutige Konferenzbeschluss mit klarer Therapieempfehlung
      begründung:
        type: string
        description: Die kurze Begründung für die Therapieentscheidung
    required:
      - konferenzbeschluss
      - begründung
    additionalProperties: false