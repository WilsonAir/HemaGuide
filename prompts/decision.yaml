  2. Konsultieren Sie SEKUNDÄR die ähnlichen Fälle und die relevanten Leitlinienausschnitte, um mögliche Therapiemuster für den Eingabefall zu identifizieren
  3. Formulieren Sie einen eindeutigen und kompakten KONFERENZBESCHLUSS mit klarer Empfehlung des nächsten (Therapie-) Schritts
  4. Begründen Sie Ihre Entscheidung.

