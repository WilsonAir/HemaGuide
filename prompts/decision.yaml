# Query case presentation template
query_case_template: |

  === EINGABEFALL ZUR ENTSCHEIDUNG ===
  Quelle: {source_file}

  ALTER: {age}
  ECOG: {ECOG}

  HAUPTDIAGNOSE:
  {main_diagnosis}

  NEBENDIAGNOSEN:
  {secondary_diagnoses}

  PROGNOSEFAKTOREN:
  {predictive_factors}

  BISHERIGE THERAPIEN:
  {prior_treatments}

  THERAPIEVERLAUF:
  {history}

  FRAGESTELLUNG AN DIE KONFERENZ:
  {question_long}

# Similar cases section template (context mode only)
similar_cases_header: |

  === ÄHNLICHE FÄLLE MIT THERAPIEENTSCHEIDUNGEN ===

  Sie haben Zugriff auf {n_cases} ähnliche Fälle. Hier sind die ausführlichen Fragestellungen und Konferenzbeschlüsse sehr ähnlicher Fälle:

similar_case_template: |
  <ähnlicher_fall_{index}>
  --- Fall {index} (Score: {score:.2f}) ---
  Quelle: {source_file}

  FRAGESTELLUNG AN DIE KONFERENZ:
  {question_long}

  KONFERENZBESCHLUSS:
  {decision_long}
  </ähnlicher_fall_{index}>
  ------------------------------------------------------------------------------------------------
# Flowchart section template (GUIDELINE mode)
flowchart_header: |

  === ENTSCHEIDUNGS-FLOWCHART ===

  Sie haben Zugriff auf {n_flowchart} Flowchart-Abschnitte:

flowchart_template: |

  --- Flowchart {index} (Relevanz: {score:.2f}) ---
  Quelle: {source_file}

  {content}

flowchart_footer: |

  HINWEIS: Nutzen Sie diesen Flowchart als Entscheidungshilfe für Ihre Therapieentscheidung.

# Synthesis sections for ADVANCED mode (dual synthesis approach)
# Used when context tailoring produces case_synthesis and/or pubmed_synthesis
case_synthesis_section: |

  === EVIDENZ AUS ÄHNLICHEN FÄLLEN ===
  {case_synthesis}
  (Basierend auf {n_cases} ähnlichen Fällen aus der Wissensbasis)

pubmed_synthesis_section: |

  === EVIDENZ AUS AKTUELLER LITERATUR ===
  {pubmed_synthesis}
  (Basierend auf {n_pubmed} PubMed-Artikeln)

crossref_synthesis_section: |

  === EVIDENZ AUS KONFERENZBEITRÄGEN ===
  {crossref_synthesis}
  (Basierend auf {n_crossref} Konferenzbeiträgen von ASH/ASCO/EHA)

# Task instructions for ADVANCED mode (with dual synthesis)
task_instructions_advanced: |

  === IHRE AUFGABE ===

  Befolgen Sie folgende Anweisungen. Die Formulierung des KONFERENZBESCHLUSS hat höchste Priorität.
  1. Analysieren Sie PRIMÄR den Eingabefall unabhängig
      a. Betrachten Sie die Hauptdiagnose und alle dazu gehörigen Informationen genau
      b. Analysieren Sie alle bisher erhaltenen Therapien, deren Reihenfolge und bisher unwirksame Therapien mit großer Sorgfalt
      c. Berücksichtigen Sie Nebendiagnosen und Kontraindikationen für Ihre Empfehlung
  2. Konsultieren Sie SEKUNDÄR die Evidenzsynthesen (ähnliche Fälle und Literatur)
      - Die Evidenz aus ähnlichen Fällen zeigt, was in vergleichbaren Situationen empfohlen wurde
      - Die Evidenz aus der Literatur zeigt aktuelle Forschungsergebnisse und Therapieoptionen
  3. Formulieren Sie einen eindeutigen und kompakten KONFERENZBESCHLUSS mit klarer Empfehlung des nächsten (Therapie-) Schritts
  4. Begründen Sie Ihre Entscheidung mit Bezug auf die Evidenz.

  Begrenzen Sie Ihre Teilantworten auf 400 Zeichen oder weniger.

