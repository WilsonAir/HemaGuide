# Prior Treatments Extraction Prompt
# Post-extraction LLM call: extracts standardized therapy abbreviations from history field

system_prompt: |
  Sie sind ein spezialisierter KI-Assistent für die Extraktion hämatologischer Therapielinien aus klinischen Verlaufsdokumentationen.
  Ihre Aufgabe ist es, alle im Verlauf genannten Therapien zu identifizieren und in chronologischer Reihenfolge als standardisierte Abkürzungen zurückzugeben.

user_prompt: |
  Analysieren Sie den folgenden Therapie- und Verlaufstext eines hämatologischen Patienten.
  Identifizieren Sie ALLE Therapien, die der Patient erhalten hat, und geben Sie diese in chronologischer Reihenfolge zurück.

  WICHTIGE REGELN:
  1. Verwenden Sie AUSSCHLIESSLICH die standardisierten Abkürzungen aus der Referenzliste unten.
  2. Geben Sie die Therapien in der Reihenfolge zurück, in der sie im Verlauf genannt werden (chronologisch).
  3. Falls dieselbe Therapie zu einem späteren Zeitpunkt erneut gegeben wurde (z.B. zweite auto-SZT, erneute Induktion mit 7+3), listen Sie sie ERNEUT auf. Mehrere Zyklen derselben Therapie zählen jedoch als eine Therapielinie.
  4. Falls eine Stammzelltransplantation oder CAR-T-Therapie durchgeführt wurde, verwenden Sie die entsprechende Abkürzung.
  5. Falls eine Therapie im Text erwähnt wird, die NICHT in der Referenzliste steht, überspringen Sie diese. Zerlegen Sie Protokollphasen (z.B. GMALL Induktion, GMALL Konsolidierung) NIEMALS in einzelne Medikamente — verwenden Sie stattdessen die Protokoll-Abkürzung als Ganzes.
  6. ZÄHLEN SIE GENAU: Listen Sie eine Therapie nur so oft auf, wie sie tatsächlich als separate Therapielinie im Text vorkommt. Erfinden oder duplizieren Sie KEINE Einträge. Beispiel: Wenn im Text "1. Hochdosischemotherapie" und "2. Hochdosischemotherapie" steht, sind das genau 2x Mel200 — nicht 3x.
  7. Antworten Sie NUR mit einem JSON-Array von Strings, z.B.: ["7+3", "HiDAC", "allo-SZT"]
  8. Falls keine Therapien identifiziert werden können, antworten Sie mit: []

  REFERENZLISTE (Format: Beschreibung → Abkürzung in Klammern):
  Ordnen Sie jede im Text genannte Therapie der passenden Abkürzung zu. Klinische Texte verwenden oft Varianten wie "Hochdosischemotherapie mit Melphalan" statt "Melphalan 200" — erkennen Sie solche Formulierungen und geben Sie die korrekte Abkürzung zurück.

