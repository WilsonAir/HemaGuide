# HemaGuide reverse proxy: external :18780 -> backend :8001
#
# Prerequisite: port 18780 must be free. On this host it is currently used by
# medical_paper_catalog (api_server). Move that service to e.g. 18781 first:
#   sed -i 's/"port": 18780/"port": 18781/' /data/wilson_2/de/medical_paper_catalog/config/config.json
#   # restart api_server.py
#
# Install:
#   sudo cp scripts/deploy/hemaguide-nginx.conf /etc/nginx/sites-available/hemaguide
#   sudo ln -sf /etc/nginx/sites-available/hemaguide /etc/nginx/sites-enabled/hemaguide
#   sudo nginx -t && sudo systemctl reload nginx
#
# Backend (keep running on 8001):
#   uvicorn backend.main:app --host 127.0.0.1 --port 8001

server {
    listen 18780;
    listen [::]:18780;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
